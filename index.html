Pages。整个流程完全自动化：\n\n```bash\n# 本地写作\necho \"# 新文章\" \u003e content/new-post.md\ngit add . \u0026\u0026 git commit -m \"add new post\"\ngit push\n\n# 自动部署到线上\n```\n\n不需要登录任何后台，不需要点击发布按钮。**Git push 即发布**。\n\n## 结语\n\n最好的工具是那个让你忘记它存在的工具。当技术细节不再分散注意力，我们才能专注于真正重要的事情：**写出有价值的文字**。\n"])</script><script>self.__next_f.push([1,"9:Tb32,"])</script><script>self.__next_f.push([1,"## 为什么需要类型系统\n\nJavaScript 的动态类型带来了灵活性，但也埋下了许多隐患。在大型项目中，类型错误是运行时错误的主要来源之一。\n\nTypeScript 通过静态类型检查，在编译阶段就能发现大部分问题。但这只是基础，真正强大的地方在于它的**类型系统本身是一门语言**。\n\n## 泛型：类型的函数\n\n泛型让类型具有了参数化的能力，就像函数可以接收参数一样：\n\n```typescript\n// 基础泛型\nfunction identity\u003cT\u003e(arg: T): T {\n  return arg;\n}\n\n// 泛型约束\nfunction loggingIdentity\u003cT extends { length: number }\u003e(arg: T): T {\n  console.log(arg.length);\n  return arg;\n}\n```\n\n## 条件类型：类型的 if/else\n\n条件类型让我们可以根据类型之间的关系做出选择：\n\n```typescript\ntype IsString\u003cT\u003e = T extends string ? true : false;\n\ntype A = IsString\u003cstring\u003e;  // true\ntype B = IsString\u003cnumber\u003e;  // false\n```\n\n## 映射类型：批量转换\n\n使用映射类型可以基于已有类型创建新类型：\n\n```typescript\ntype Readonly\u003cT\u003e = {\n  readonly [P in keyof T]: T[P];\n};\n\ntype Partial\u003cT\u003e = {\n  [P in keyof T]?: T[P];\n};\n\n// 使用\ninterface User {\n  name: string;\n  age: number;\n}\n\ntype ReadonlyUser = Readonly\u003cUser\u003e;\n// { readonly name: string; readonly age: number; }\n```\n\n## infer：类型推导\n\n`infer` 关键字允许我们在条件类型中推导类型：\n\n```typescript\ntype ReturnType\u003cT\u003e = T extends (...args: any[]) =\u003e infer R ? R : never;\n\nfunction foo() {\n  return { x: 1, y: 2 };\n}\n\ntype FooReturn = ReturnType\u003ctypeof foo\u003e;\n// { x: number; y: number; }\n```\n\n## 实用工具类型\n\nTypeScript 内置了许多实用的工具类型：\n\n| 工具类型         | 作用                   |\n| ---------------- | ---------------------- |\n| `Partial\u003cT\u003e`     | 所有属性变为可选       |\n| `Required\u003cT\u003e`    | 所有属性变为必选       |\n| `Readonly\u003cT\u003e`    | 所有属性变为只读       |\n| `Pick\u003cT, K\u003e`     | 选择部分属性           |\n| `Omit\u003cT, K\u003e`     | 排除部分属性           |\n| `Exclude\u003cT, U\u003e`  | 从联合类型中排除       |\n| `Extract\u003cT, U\u003e`  | 从联合类型中提取       |\n| `NonNullable\u003cT\u003e` | 排除 null 和 undefined |\n\n## 递归类型\n\n处理嵌套结构时，递归类型非常有用：\n\n```typescript\ntype DeepReadonly\u003cT\u003e = {\n  readonly [P in keyof T]: T[P] extends object \n    ? DeepReadonly\u003cT[P]\u003e \n    : T[P];\n};\n\ninterface Nested {\n  a: { b: { c: string } };\n}\n\ntype ReadonlyNested = DeepReadonly\u003cNested\u003e;\n// 所有层级都变为只读\n```\n\n## 结语\n\nTypeScript 的类型系统是一个强大的工具，它不仅能帮助我们捕获错误，还能作为文档、提高 IDE 体验、重构时提供安全保障。\n\n但记住，类型的目的是让代码更清晰，而不是更复杂。在实用和炫技之间找到平衡，才是使用 TypeScript 的正确姿势。\n"])</script><script>self.__next_f.push([1,"0:{\"P\":null,\"b\":\"CiMLRtogK6wlsIjq2venZ\",\"p\":\"\",\"c\":[\"\",\"\"],\"i\":false,\"f\":[[[\"\",{\"children\":[\"__PAGE__\",{}]},\"$undefined\",\"$undefined\",true],[\"\",[\"$\",\"$1\",\"c\",{\"children\":[[[\"$\",\"link\",\"0\",{\"rel\":\"stylesheet\",\"href\":\"/_next/static/css/584b8c96e7a07563.css\",\"precedence\":\"next\",\"crossOrigin\":\"$undefined\",\"nonce\":\"$undefined\"}]],[\"$\",\"html\",null,{\"lang\":\"zh-CN\",\"suppressHydrationWarning\":true,\"children\":[[\"$\",\"head\",null,{\"children\":[\"$\",\"script\",null,{\"dangerouslySetInnerHTML\":{\"__html\":\"\\n              (function() {\\n                const theme = localStorage.getItem('theme');\\n                if (theme === 'dark' || (!theme \u0026\u0026 window.matchMedia('(prefers-color-scheme: dark)').matches)) {\\n                  document.documentElement.setAttribute('data-theme', 'dark');\\n                }\\n              })();\\n            \"}}]}],[\"$\",\"body\",null,{\"className\":\"min-h-screen antialiased\",\"children\":[\"$\",\"$L2\",null,{\"parallelRouterKey\":\"children\",\"error\":\"$undefined\",\"errorStyles\":\"$undefined\",\"errorScripts\":\"$undefined\",\"template\":[\"$\",\"$L3\",null,{}],\"templateStyles\":\"$undefined\",\"templateScripts\":\"$undefined\",\"notFound\":[ 实践** - 将学到的知识应用到实际问题中\\n\\n## 为什么深度很重要\\n\\n### 1. 理解本质\\n\\n浅层学习让我们知道\\\"是什么\\\"，深度学习让我们理解\\\"为什么\\\"。只有理解了底层原理，我们才能举一反三，应对各种复杂情况。\\n\\n### 2. 建立联系\\n\\n碎片化的知识是孤立的，深度的学习能够帮我们建立知识之间的联系，形成网络效应。当知识相互连接，它们的价值会指数级增长。\\n\\n### 3. 形成洞察\\n\\n真正的创新往往来自于对某个领域的深度理解。只有在深入了解之后，我们才能发现别人看不到的机会和问题。\\n\\n## 如何培养深度\\n\\n1. **设定边界** - 明确学习和思考的时间，避免被其他事情打断\\n2. **减少输入** - 有意识地减少信息摄入量，提高信息质量\\n3. **写作输出** - 通过写作整理思路，这是检验理解程度的最好方式\\n4. **定期回顾** - 建立知识管理系统，定期回顾和更新认知\\n\\n## 结语\\n\\n深度不是一蹴而就的，它需要持续的努力和刻意的练习。但正是这种深度，让我们在浮躁的时代保持清醒，在复杂的世界中找到方向。\\n\\n\u003e \\\"在浅薄的时代，做一个深度的人。\\\"\\n\"},{\"slug\":\"minimal-writing-system\",\"title\":\"构建极简写作系统\",\"date\":\"2024-11-28\",\"tags\":[\"Labs\"],\"summary\":\" 工具的陷阱\\n\\n作为一个写作者，我尝试过很多写作工具：从功能丰富的 Word 到简洁的 Markdown 编辑器，从在线协作平台到本地知识管理软件。每次尝试新工具时，我都会花费大量时间去学习它的功能、配置它的环境、优化它的设置。\\n\\n但最终我发现，工具越复杂，创作的阻力就越大。\\n\\n 回归本质\\n\\n写作的本质是什么？是把想法转化为文字。仅此而已。\\n\\n一个好的写作系统应该满足以下条件：\\n\\n...\",\"content\":\"$8\"},{\"slug\":\"typescript-advanced-types\",\"title\":\"TypeScript 的高级类型体操\",\"date\":\"2024-10-10\",\"tags\":[\"TypeScript\"],\"summary\":\" 为什么需要类型系统\\n\\nJavaScript 的动态类型带来了灵活性，但也埋下了许多隐患。在大型项目中，类型错误是运行时错误的主要来源之一。\\n\\nTypeScript 通过静态类型检查，在编译阶段就能发现大部分问题。但这只是基础，真正强大的地方在于它的类型系统本身是一门语言。\\n\\n 泛型：类型的函数\\n\\n泛型让类型具有了参数化的能力，就像函数可以接收参数一样：\\n\\ntypescrip...\",\"content\":\"$9\"}],\"tags\":[{\"name\":\"Labs\",\"count\":1},{\"name\":\"TypeScript\",\"count\":1},{\"name\":\"思考\",\"count\":1}]}]}],null,\"$La\"]}],{},null,false]},null,false],\"$Lb\",false]],\"m\":\"$undefined\",\"G\":[\"$c\",[]],\"s\":false,\"S\":true}\n"])</script><script>self.__next_f.push([1,"d:I[4431,[],\"OutletBoundary\"]\nf:I[5278,[],\"AsyncMetadataOutlet\"]\n11:I[4431,[],\"ViewportBoundary\"]\n13:I[4431,[],\"MetadataBoundary\"]\na:[\"$\",\"$Ld\",null,{\"children\":[\"$Le\",[\"$\",\"$Lf\",null,{\"promise\":\"$@10\"}]]}]\nb:[\"$\",\"$1\",\"h\",{\"children\":[null,[[\"$\",\"$L11\",null,{\"children\":\"$L12\"}],null],[\"$\",\"$L13\",null,{\"children\":[\"$\",\"div\",null,{\"hidden\":true,\"children\":[\
